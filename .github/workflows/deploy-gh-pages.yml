name: Deploy Web & Android

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Deploy web app to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EOF

      - name: Build web app
        run: npx expo export --platform web

      - name: Fix paths for GitHub Pages subdirectory
        run: |
          chmod +x fix-gh-pages-paths.sh
          ./fix-gh-pages-paths.sh dist

      - name: Copy PWA files
        run: |
          if [ -f "public/manifest.json" ]; then
            cp public/manifest.json dist/
          fi
          if [ -f "public/service-worker.js" ]; then
            cp public/service-worker.js dist/
          fi
          if [ -f "public/offline.html" ]; then
            cp public/offline.html dist/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "Deploy: ${{ github.sha }}"
          allow_empty_commit: true

  # ─────────────────────────────────────────────
  # Job 2: Build & submit Android app to Play Store (local Gradle build)
  # Required secrets:
  #   ANDROID_KEYSTORE_BASE64       – base64 of your release .keystore file
  #                                   base64 -i release.keystore | pbcopy  (macOS)
  #   ANDROID_STORE_PASSWORD        – keystore password
  #   ANDROID_KEY_ALIAS             – key alias inside the keystore
  #   ANDROID_KEY_PASSWORD          – key password
  #   GOOGLE_SERVICE_ACCOUNT_KEY    – Play Store service account JSON (base64-encoded)
  #                                   Google Play Console → Setup → API access → create service account
  #                                   base64 -i service-account.json | pbcopy  (macOS)
  # ─────────────────────────────────────────────
  deploy-android:
    name: Deploy Android → Play Store
    runs-on: ubuntu-latest
    # Both jobs run in parallel. Add "needs: deploy-web" to make this sequential.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EOF

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Decode Google Play service account key
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > /tmp/google-service-account.json

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        env:
          MYAPP_RELEASE_STORE_FILE: release.keystore
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PMYAPP_RELEASE_STORE_FILE=release.keystore \
            -PMYAPP_RELEASE_STORE_PASSWORD="${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -PMYAPP_RELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PMYAPP_RELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload AAB to Play Store (Internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          packageName: com.sarathk82.smpljournal
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
